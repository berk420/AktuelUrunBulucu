services:

  postgres:
    image: postgres:16-alpine
    container_name: aktuel_db
    environment:
      POSTGRES_DB: aktueldb
      POSTGRES_USER: aktuel_user
      POSTGRES_PASSWORD: aktuel_pass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aktuel_user -d aktueldb"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: aktuel_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres

volumes:
  postgres_data: