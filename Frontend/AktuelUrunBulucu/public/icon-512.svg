<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Arka plan gradyanı -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b2b"/>
      <stop offset="100%" style="stop-color:#d63a00"/>
    </linearGradient>
    <!-- Pin gölgesi -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <!-- İç parlaklık -->
    <radialGradient id="shine" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Arka plan: yuvarlak kare -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Parlaklık katmanı -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shine)"/>

  <!-- Harita pini (ana şekil) -->
  <g filter="url(#shadow)" transform="translate(256,265)">
    <!-- Pin gövdesi -->
    <ellipse cx="0" cy="-90" rx="88" ry="88" fill="white"/>
    <!-- Pin sivri ucu -->
    <path d="M -38,8 Q 0,110 0,110 Q 0,110 38,8 Z" fill="white"/>
    <!-- Pin iç dairesi (delik efekti) -->
    <ellipse cx="0" cy="-90" rx="32" ry="32" fill="url(#bg)"/>
  </g>

  <!-- Fiyat etiketi (pin içinde) -->
  <g transform="translate(256,175)">
    <!-- Etiket dikdörtgeni -->
    <rect x="-34" y="-22" width="68" height="44" rx="8" ry="8" fill="url(#bg)"/>
    <!-- Delik -->
    <circle cx="0" cy="-22" r="6" fill="white"/>
    <!-- % işareti -->
    <text
      x="0" y="10"
      text-anchor="middle"
      font-family="'Arial Black', Arial, sans-serif"
      font-weight="900"
      font-size="32"
      fill="white"
      letter-spacing="-1"
    >%</text>
  </g>

  <!-- Alt kısım: dalgalı vurgu çizgisi -->
  <path d="M 100,410 Q 180,390 256,410 Q 332,430 412,410" stroke="rgba(255,255,255,0.25)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Alt metin: A harfi marka dokunuşu -->
  <text
    x="256" y="470"
    text-anchor="middle"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="36"
    fill="rgba(255,255,255,0.55)"
    letter-spacing="6"
  >AKTÜEL</text>
</svg>
