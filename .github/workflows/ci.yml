name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  notify-start:
    name: Notify CI Started
    runs-on: ubuntu-latest
    steps:
      - name: Send start notification
        run: |
          COMMIT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT:0:7}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=🚀 <b>CI/CD Başladı – AktuelUrunBulucu</b>%0A%0ACommit: <code>$COMMIT_SHORT</code>%0ABranch: main%0ATetikleyen: ${{ github.actor }}"

  check-mobile:
    name: Check Mobile Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if Mobile directory changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^Mobile/"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-backend:
    name: Build Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        working-directory: Backend/AktuelUrunBulucu
        run: dotnet restore

      - name: Build
        working-directory: Backend/AktuelUrunBulucu
        run: dotnet build --configuration Release --no-restore 2>&1 | tee /tmp/backend-build.log

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-error-log
          path: /tmp/backend-build.log
          retention-days: 1

  build-frontend:
    name: Build Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/AktuelUrunBulucu/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/AktuelUrunBulucu
        run: npm ci

      - name: Lint
        working-directory: Frontend/AktuelUrunBulucu
        run: npm run lint 2>&1 | tee /tmp/frontend-lint.log

      - name: Build
        working-directory: Frontend/AktuelUrunBulucu
        run: npm run build 2>&1 | tee /tmp/frontend-build.log

      - name: Merge error logs
        if: failure()
        run: cat /tmp/frontend-lint.log /tmp/frontend-build.log > /tmp/frontend-error.log 2>/dev/null || true

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-error-log
          path: /tmp/frontend-error.log
          retention-days: 1

      - name: Upload frontend build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/AktuelUrunBulucu/dist
          retention-days: 1

  build-mobile:
    name: Build Mobile (APK)
    needs: check-mobile
    if: needs.check-mobile.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Flutter pub get
        working-directory: Mobile
        run: flutter pub get

      - name: Build APK
        working-directory: Mobile
        run: flutter build apk --debug --split-per-abi --dart-define-from-file=env/production.json

      - name: APK Release olarak yayınla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.sha }}
          name: APK – ${{ github.sha }}
          files: Mobile/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Telegram APK linkini gönder
        run: |
          COMMIT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT:0:7}"
          URL="https://github.com/${{ github.repository }}/releases/download/apk-$COMMIT/app-arm64-v8a-debug.apk"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=📱 <b>APK hazır!</b>%0ACommit: <code>$COMMIT_SHORT</code>%0A%0A<a href=\"$URL\">APK İndir (.apk)</a>"

  deploy:
    name: Deploy to Windows Server
    needs: [build-backend, build-frontend]
    runs-on: [self-hosted, Windows]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Backup current backend version
        shell: powershell
        run: |
          if (Test-Path "C:\deploy\backend") {
            if (Test-Path "C:\deploy\backend-previous") {
              Remove-Item "C:\deploy\backend-previous" -Recurse -Force
            }
            Copy-Item "C:\deploy\backend" "C:\deploy\backend-previous" -Recurse
          }

      - name: Publish backend
        shell: powershell
        run: |
          dotnet publish Backend/AktuelUrunBulucu/AktuelUrunBulucu.csproj `
            --configuration Release `
            --output C:\deploy\backend-new `
            2>&1 | Tee-Object -FilePath C:\deploy\deploy-error.log

      - name: Ensure PostgreSQL user and database exist
        shell: powershell
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          $psql = "C:\Program Files\PostgreSQL\18\bin\psql.exe"
          $userExists = & $psql -U postgres -h 127.0.0.1 -p 5432 -tAc "SELECT 1 FROM pg_roles WHERE rolname='aktuel_user';"
          if ($userExists -ne "1") {
            Write-Host "aktuel_user bulunamadi, olusturuluyor..."
            & $psql -U postgres -h 127.0.0.1 -p 5432 -c "CREATE USER aktuel_user WITH PASSWORD 'aktuel_pass123';"
          } else {
            Write-Host "aktuel_user mevcut, sifre guncelleniyor..."
            & $psql -U postgres -h 127.0.0.1 -p 5432 -c "ALTER USER aktuel_user WITH PASSWORD 'aktuel_pass123';"
          }
          $dbExists = & $psql -U postgres -h 127.0.0.1 -p 5432 -tAc "SELECT 1 FROM pg_database WHERE datname='aktueldb';"
          if ($dbExists -ne "1") {
            Write-Host "aktueldb bulunamadi, olusturuluyor..."
            & $psql -U postgres -h 127.0.0.1 -p 5432 -c "CREATE DATABASE aktueldb OWNER aktuel_user;"
          }
          & $psql -U postgres -h 127.0.0.1 -p 5432 -c "GRANT ALL PRIVILEGES ON DATABASE aktueldb TO aktuel_user;"
          Write-Host "PostgreSQL kurulumu tamamlandi."

      - name: Swap backend and restart service
        shell: powershell
        run: |
          Stop-Service AktuelUrunBulucu -ErrorAction SilentlyContinue
          if (Test-Path "C:\deploy\backend") {
            Remove-Item "C:\deploy\backend" -Recurse -Force
          }
          Rename-Item "C:\deploy\backend-new" "C:\deploy\backend"
          $svc = Get-Service -Name "AktuelUrunBulucu" -ErrorAction SilentlyContinue
          if (-not $svc) {
            New-Service -Name "AktuelUrunBulucu" `
              -BinaryPathName "C:\deploy\backend\AktuelUrunBulucu.exe" `
              -DisplayName "AktuelUrunBulucu" `
              -StartupType Automatic `
              -DependsOn @("postgresql-x64-18")
          }
          Start-Service AktuelUrunBulucu

      - name: Clean previous frontend dist
        shell: powershell
        run: |
          if (Test-Path "C:\deploy\frontend-dist") {
            Remove-Item "C:\deploy\frontend-dist" -Recurse -Force
          }

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: C:\deploy\frontend-dist

      - name: Deploy frontend to IIS
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\AktuelFrontend"
          if (Test-Path $target) {
            Remove-Item "$target\*" -Recurse -Force
          }
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          Copy-Item "C:\deploy\frontend-dist\*" "$target\" -Recurse -Force

      - name: Upload deploy error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-error-log
          path: C:\deploy\deploy-error.log
          retention-days: 1

  notify:
    name: Send Telegram Notification
    needs: [build-backend, build-frontend, deploy, build-mobile]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.build-backend.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Backend (.NET 10)" >> "$GITHUB_OUTPUT"
            echo "artifact=backend-error-log" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build-frontend.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Frontend (React/Vite)" >> "$GITHUB_OUTPUT"
            echo "artifact=frontend-error-log" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Deploy (Windows Server)" >> "$GITHUB_OUTPUT"
            echo "artifact=deploy-error-log" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build-mobile.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Mobile (Flutter)" >> "$GITHUB_OUTPUT"
            echo "artifact=" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "component=Tüm adımlar" >> "$GITHUB_OUTPUT"
            echo "artifact=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download error log
        if: steps.status.outputs.result == 'failure' && steps.status.outputs.artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.status.outputs.artifact }}
          path: /tmp/error-logs/
        continue-on-error: true

      - name: Send Telegram notification
        run: |
          COMMIT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT:0:7}"
          ACTOR="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          COMPONENT="${{ steps.status.outputs.component }}"
          RESULT="${{ steps.status.outputs.result }}"

          if [ "$RESULT" = "success" ]; then
            MESSAGE="✅ <b>CI BAŞARILI – AktuelUrunBulucu</b>%0A%0ACommit: <code>$COMMIT_SHORT</code> | Branch: main | Tetikleyen: $ACTOR%0A%0ATüm adımlar başarıyla tamamlandı.%0A%0A<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">Detaylar</a>"
          else
            ERROR_LOG="Hata logu indirilemedi."
            for f in /tmp/error-logs/*; do
              if [ -f "$f" ]; then
                ERROR_LOG=$(tail -30 "$f")
                break
              fi
            done
            MESSAGE="❌ <b>CI HATASI – AktuelUrunBulucu</b>%0A%0ABileşen: $COMPONENT%0ACommit: <code>$COMMIT_SHORT</code> | Branch: main | Tetikleyen: $ACTOR%0A%0A<pre>$(echo "$ERROR_LOG" | head -c 2000)</pre>%0A%0A<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">Tam loglar</a>"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
