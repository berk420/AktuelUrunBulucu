name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-backend:
    name: Build Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        working-directory: Backend/AktuelUrunBulucu
        run: dotnet restore

      - name: Build
        working-directory: Backend/AktuelUrunBulucu
        run: dotnet build --configuration Release --no-restore 2>&1 | tee /tmp/backend-build.log

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-error-log
          path: /tmp/backend-build.log
          retention-days: 1

  build-frontend:
    name: Build Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/AktuelUrunBulucu/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/AktuelUrunBulucu
        run: npm ci

      - name: Lint
        working-directory: Frontend/AktuelUrunBulucu
        run: npm run lint 2>&1 | tee /tmp/frontend-lint.log

      - name: Build
        working-directory: Frontend/AktuelUrunBulucu
        run: npm run build 2>&1 | tee /tmp/frontend-build.log

      - name: Merge error logs
        if: failure()
        run: cat /tmp/frontend-lint.log /tmp/frontend-build.log > /tmp/frontend-error.log 2>/dev/null || true

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-error-log
          path: /tmp/frontend-error.log
          retention-days: 1

  deploy:
    name: Deploy to Windows Server
    needs: [build-backend, build-frontend]
    runs-on: [self-hosted, Windows]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Backup current backend version
        shell: pwsh
        run: |
          if (Test-Path "C:\deploy\backend") {
            if (Test-Path "C:\deploy\backend-previous") {
              Remove-Item "C:\deploy\backend-previous" -Recurse -Force
            }
            Copy-Item "C:\deploy\backend" "C:\deploy\backend-previous" -Recurse
          }

      - name: Publish backend
        shell: pwsh
        run: |
          dotnet publish Backend/AktuelUrunBulucu/AktuelUrunBulucu.csproj `
            --configuration Release `
            --output C:\deploy\backend-new `
            2>&1 | Tee-Object -FilePath C:\deploy\deploy-error.log

      - name: Swap backend and restart service
        shell: pwsh
        run: |
          Stop-Service AktuelUrunBulucu -ErrorAction SilentlyContinue
          if (Test-Path "C:\deploy\backend") {
            Remove-Item "C:\deploy\backend" -Recurse -Force
          }
          Rename-Item "C:\deploy\backend-new" "C:\deploy\backend"
          Start-Service AktuelUrunBulucu

      - name: Build and deploy frontend
        shell: pwsh
        working-directory: Frontend/AktuelUrunBulucu
        run: |
          npm ci
          npm run build
          if (Test-Path "C:\nginx\html") {
            Remove-Item "C:\nginx\html\*" -Recurse -Force
          }
          Copy-Item "dist\*" "C:\nginx\html\" -Recurse
          & C:\nginx\nginx.exe -s reload

      - name: Upload deploy error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-error-log
          path: C:\deploy\deploy-error.log
          retention-days: 1

  notify:
    name: Send Email Notification
    needs: [build-backend, build-frontend, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.build-backend.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Backend (.NET 10)" >> "$GITHUB_OUTPUT"
            echo "artifact=backend-error-log" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build-frontend.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Frontend (React/Vite)" >> "$GITHUB_OUTPUT"
            echo "artifact=frontend-error-log" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Deploy (Windows Server)" >> "$GITHUB_OUTPUT"
            echo "artifact=deploy-error-log" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "component=Tüm adımlar" >> "$GITHUB_OUTPUT"
            echo "artifact=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download error log
        if: steps.status.outputs.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.status.outputs.artifact }}
          path: /tmp/error-logs/
        continue-on-error: true

      - name: Build email body
        run: |
          COMMIT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT:0:7}"
          ACTOR="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          COMPONENT="${{ steps.status.outputs.component }}"
          RESULT="${{ steps.status.outputs.result }}"

          if [ "$RESULT" = "success" ]; then
            cat > /tmp/email_body.txt << EOF
          ✅ CI BAŞARILI – AktuelUrunBulucu

          Commit  : $COMMIT_SHORT  |  Branch: main  |  Tetikleyen: $ACTOR

          Tüm adımlar başarıyla tamamlandı ve deploy edildi.

          Detaylar: https://github.com/$REPO/actions/runs/$RUN_ID
          EOF
          else
            ERROR_LOG="Hata logu indirilemedi."
            for f in /tmp/error-logs/*; do
              if [ -f "$f" ]; then
                ERROR_LOG=$(tail -100 "$f")
                break
              fi
            done

            cat > /tmp/email_body.txt << EOF
          ❌ CI HATASI – AktuelUrunBulucu

          Bileşen : $COMPONENT
          Commit  : $COMMIT_SHORT  |  Branch: main  |  Tetikleyen: $ACTOR

          ── HATA LOGU ────────────────────────────────────────────────

          $ERROR_LOG

          ─────────────────────────────────────────────────────────────

          Tam loglar: https://github.com/$REPO/actions/runs/$RUN_ID
          EOF
          fi

      - name: Send success email
        if: steps.status.outputs.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[CI SUCCESS] AktuelUrunBulucu | ${{ github.sha }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: "CI Bot <${{ secrets.MAIL_USERNAME }}>"
          body: file:///tmp/email_body.txt

      - name: Send failure email
        if: steps.status.outputs.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[CI FAILURE] AktuelUrunBulucu | ${{ steps.status.outputs.component }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: "CI Bot <${{ secrets.MAIL_USERNAME }}>"
          body: file:///tmp/email_body.txt
